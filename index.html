<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Key Hub</title>
    <style>
        body { font-family: monospace; background: #0d1117; color: #c9d1d9; line-height: 1.6; padding: 40px; max-width: 800px; margin: 0 auto; }
        h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; margin-top: 20px; }
        code { background: #000; color: #7ee787; padding: 4px 8px; border-radius: 4px; display: block; overflow-x: auto; margin: 10px 0; }
        .copy-btn { cursor: pointer; background: #238636; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; }
        .copy-btn:hover { background: #2ea043; }
        .footer { margin-top: 40px; font-size: 0.8em; color: #8b949e; }
    </style>
</head>
<body>

    <h1>🔑 SSH Public Keys</h1>
    <p>你可以使用以下命令将我的公钥快速导入你的服务器：</p>

    <div class="card">
        <strong>tano26 / ECDSA-SK</strong>
        <code id="cmd1">curl -fsSL https://your-domain.com/tano26/ECDSA-SK >> ~/.ssh/authorized_keys</code>
        <button class="copy-btn" onclick="copyText('cmd1')">复制命令</button>
    </div>

    <div class="footer">
        Generated by Cloudflare Pages • <a href="https://github.com/your-repo" style="color: #58a6ff;">Source Code</a>
    </div>

    <script>
        function copyText(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('命令已复制到剪贴板！');
            });
        }
    </script>
</body>
</html>
